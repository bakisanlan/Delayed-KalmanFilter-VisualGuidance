camera_emulator_node:
  ros__parameters:
    # ----- Image sensor -----
    image_width: 640
    image_height: 480

    # ----- Intrinsic matrix (pinhole) -----
    fx: 320.0
    fy: 320.0
    cx: 320.0
    cy: 240.0

    # ----- Radtan distortion [k1, k2, p1, p2] -----
    dist_coeffs: [-0.1, 0.01, 0.0, 0.0]

    # ----- Noise -----
    noise_sigma: 1.5  # Gaussian pixel noise std-dev (pixels)

    # ----- Rate -----
    rate_hz: 30.0

    # ----- Topics (override via launch or CLI) -----
    interceptor_lla_topic: /interceptor/mavros/global_position/global
    target_lla_topic: /target/mavros/global_position/global
    interceptor_local_odom_topic: /interceptor/mavros/global_position/local
    target_pixel_topic: /interceptor/camera/target_pixel
